<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyd</title>

<style>
body{
    margin:0;
    background:#f5f1e8;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:600px;
    text-align:center;
}

button{
    width:100%;
    padding:30px;
    font-size:42px;
    font-weight:bold;
    border:none;
    border-radius:100px;
    background:#111;
    color:white;
    cursor:pointer;
}

button:active{
    transform:scale(.98);
}

.speaker{
    font-size:140px;
    margin-bottom:20px;
}

audio{
    width:100%;
    margin-top:25px;
}
</style>

</head>
<body>

<div class="container">

<div class="speaker">🔊</div>

<button id="playButton">AFSPIL</button>

<audio id="audio" controls></audio>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id") || "1";

const audio = document.getElementById("audio");

audio.src = "audio/" + id + ".mp3";

const button = document.getElementById("playButton");

async function playAudio(){

    try{

        await audio.play();

        button.innerText="SPILLER";

    }catch(e){

        button.innerText="AFSPIL";

    }

}

button.onclick = playAudio;

playAudio();

</script>

</body>
</html>
